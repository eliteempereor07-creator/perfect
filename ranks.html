<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processor Rankings — ProcBench</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh;}

.top-nav{display:flex;justify-content:space-between;align-items:center;padding:14px 30px;background:#111827;border-bottom:1px solid #1e293b;}
.nav-buttons{display:flex;gap:12px;}
.nav-btn{text-decoration:none;padding:8px 16px;border-radius:6px;background:#38bdf8;color:#0a0f1e;font-weight:700;font-size:14px;transition:.2s;}
.nav-btn:hover{background:#0ea5e9;}
.logo{font-family:'Space Mono',monospace;color:#38bdf8;font-size:14px;}

.page-header{padding:50px 20px 30px;text-align:center;background:linear-gradient(180deg,#111827 0%,#0a0f1e 100%);}
.page-header h1{font-family:'Space Mono',monospace;font-size:clamp(22px,4vw,38px);color:#38bdf8;margin-bottom:8px;}
.page-header p{color:#94a3b8;font-size:14px;}

.controls{max-width:1100px;margin:0 auto 20px;padding:0 20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
#search{flex:1;min-width:220px;padding:12px 18px;font-size:15px;font-family:'Sora',sans-serif;border-radius:8px;border:1px solid #1e3a5f;background:#111827;color:white;outline:none;transition:.2s;}
#search:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.15);}
.filter-btns{display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{padding:8px 14px;border-radius:6px;border:1px solid #1e3a5f;background:transparent;color:#94a3b8;font-family:'Sora',sans-serif;font-size:13px;cursor:pointer;transition:.2s;}
.filter-btn:hover,.filter-btn.active{background:#38bdf8;color:#0a0f1e;border-color:#38bdf8;font-weight:600;}
.count-badge{display:inline-block;padding:4px 12px;background:#1e293b;border-radius:999px;font-size:13px;color:#7dd3fc;font-family:'Space Mono',monospace;margin-left:auto;}

.table-wrapper{max-width:1100px;margin:0 auto 60px;padding:0 20px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;background:#111827;border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);}
thead tr{background:#0f3460;}
th{padding:14px 16px;text-align:left;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em;color:#7dd3fc;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:#38bdf8;}
th .sort-icon{margin-left:4px;opacity:.4;}
th.sorted .sort-icon{opacity:1;color:#38bdf8;}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid #1e293b;white-space:nowrap;}
tbody tr{transition:.15s;}
tbody tr:hover{background:#1e293b;}
tbody tr:last-child td{border-bottom:none;}

.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;background:#1e293b;color:#94a3b8;}
.rank-1{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;}
.rank-2{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#000;}
.rank-3{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff;}

.company-pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;}
.pill-Apple{background:#1a2744;color:#60a5fa;border:1px solid #1e3a5f;}
.pill-Qualcomm{background:#1e1a2e;color:#c084fc;border:1px solid #2d2445;}
.pill-MediaTek{background:#1a2e1e;color:#4ade80;border:1px solid #1e3d26;}
.pill-Samsung{background:#1e2a1a;color:#a3e635;border:1px solid #253322;}
.pill-Google{background:#2e1a1a;color:#f87171;border:1px solid #3d2222;}
.pill-Huawei{background:#2e261a;color:#fb923c;border:1px solid #3d3222;}

.score-cell{display:flex;align-items:center;gap:8px;}
.mini-bar{width:55px;height:6px;background:#1e293b;border-radius:3px;overflow:hidden;flex-shrink:0;}
.mini-fill{height:100%;border-radius:3px;}

.nano-score{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:#38bdf8;}
.process-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-family:'Space Mono',monospace;background:#0f2244;color:#7dd3fc;border:1px solid #1e3a5f;}

.loading-row{text-align:center;padding:60px 20px;color:#94a3b8;}
.error-row{text-align:center;padding:60px 20px;color:#f87171;}
.empty-state{text-align:center;padding:60px 20px;color:#475569;}
.empty-state h3{font-size:20px;margin-bottom:8px;}

footer{text-align:center;padding:20px;background:#111827;color:#475569;font-size:13px;border-top:1px solid #1e293b;}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-buttons">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="about.html" class="nav-btn">About</a>
  </div>
  <span class="logo">📱 ProcBench</span>
</nav>

<div class="page-header">
  <h1>📊 Processor Rankings</h1>
  <p>Full database sorted by NanoScore — click any column header to re-sort</p>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="🔍  Search processor name...">
  <div class="filter-btns" id="filterBtns">
    <button class="filter-btn active" data-company="All">All</button>
    <button class="filter-btn" data-company="Apple">Apple</button>
    <button class="filter-btn" data-company="Qualcomm">Qualcomm</button>
    <button class="filter-btn" data-company="MediaTek">MediaTek</button>
    <button class="filter-btn" data-company="Samsung">Samsung</button>
    <button class="filter-btn" data-company="Google">Google</button>
    <button class="filter-btn" data-company="Huawei">Huawei</button>
  </div>
  <span class="count-badge" id="countBadge">— chips</span>
</div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th data-col="rank">Rank <span class="sort-icon">↕</span></th>
        <th data-col="name">Processor <span class="sort-icon">↕</span></th>
        <th data-col="company">Company <span class="sort-icon">↕</span></th>
        <th data-col="cpu">CPU <span class="sort-icon">↕</span></th>
        <th data-col="gpu">GPU <span class="sort-icon">↕</span></th>
        <th data-col="battery">Battery <span class="sort-icon">↕</span></th>
        <th data-col="antutu">AnTuTu <span class="sort-icon">↕</span></th>
        <th data-col="process">Node <span class="sort-icon">↕</span></th>
        <th data-col="nanoScore">NanoScore <span class="sort-icon">↕</span></th>
      </tr>
    </thead>
    <tbody id="cpuTable">
      <tr><td colspan="9" class="loading-row">⏳ Loading processors from database...</td></tr>
    </tbody>
  </table>
</div>

<footer>© 2026 ProcBench — Processor Comparison Tool</footer>

<script src="db.js"></script>
<script>
let sortCol='rank', sortDir=1, activeCompany='All';

function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase();
  return rankedProcessors.filter(p =>
    p.name.toLowerCase().includes(q) &&
    (activeCompany === 'All' || p.company === activeCompany)
  );
}

function getSorted(data){
  return [...data].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });
}

function renderTable(){
  const sorted = getSorted(getFiltered());
  document.getElementById('countBadge').textContent = sorted.length + ' chips';
  const tbody = document.getElementById('cpuTable');
  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><h3>No processors found</h3><p>Try a different search or filter</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = sorted.map(p => {
    const rc = p.rank <= 3 ? ` rank-${p.rank}` : '';
    const pc = `pill-${p.company}`;
    return `<tr>
      <td><span class="rank-badge${rc}">${p.rank}</span></td>
      <td style="font-weight:600">${p.name}</td>
      <td><span class="company-pill ${pc}">${p.company}</span></td>
      <td><div class="score-cell"><div class="mini-bar"><div class="mini-fill" style="width:${p.cpu}%;background:#60a5fa"></div></div><span>${p.cpu}</span></div></td>
      <td><div class="score-cell"><div class="mini-bar"><div class="mini-fill" style="width:${p.gpu}%;background:#a78bfa"></div></div><span>${p.gpu}</span></div></td>
      <td><div class="score-cell"><div class="mini-bar"><div class="mini-fill" style="width:${p.battery}%;background:#34d399"></div></div><span>${p.battery}</span></div></td>
      <td style="color:#94a3b8;font-size:13px">${(p.antutu||0).toLocaleString()}</td>
      <td><span class="process-badge">${p.process||'N/A'}</span></td>
      <td><span class="nano-score">${p.nanoScore}</span></td>
    </tr>`;
  }).join('');
}

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = (col==='name'||col==='company'||col==='process') ? 1 : -1; }
    document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    renderTable();
  });
});

document.getElementById('filterBtns').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeCompany = btn.dataset.company;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
});

document.getElementById('search').addEventListener('input', renderTable);

// ── Wait for DB ───────────────────────────────────────────────
document.addEventListener('dbReady', renderTable);
document.addEventListener('dbError', () => {
  document.getElementById('cpuTable').innerHTML =
    '<tr><td colspan="9" class="error-row">❌ Could not connect to database. Is Flask running?</td></tr>';
});
</script>
</body>
</html>
